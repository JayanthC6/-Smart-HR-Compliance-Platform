spring:
  application:
    name: platform

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hr_compliance}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis

server:
  port: 8081
  servlet:
    session:
      persistent: false

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  huggingface:
    token: ${HF_TOKEN}
  groq:
    api-key: ${GROQ_API_KEY}
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs