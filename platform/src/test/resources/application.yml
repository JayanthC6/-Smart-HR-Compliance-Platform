spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: sa
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: none

app:
  jwt:
    secret: mock_jwt_secret_key_mock_jwt_secret_key_mock_jwt_secret_key_mock_jwt_secret_key
    expiration-ms: 86400000
  huggingface:
    token: mock_hf_token
  groq:
    api-key: mock_groq_api_key
